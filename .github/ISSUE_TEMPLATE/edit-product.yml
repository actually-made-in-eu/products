name: Suggest an edit
description: Introduce corrections into the database.
title: "[Edit]: <insert the file name here>"
labels: ["edit-product"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking you time to improve our database!
  - type: markdown
    attributes:
      value: |
        Please fill in below fields that you believe are currently incorrect for this product.
  - type: input
    id: urlTitle
    attributes:
      label: Company / product title
      description: Company title or a short product description
      placeholder: ex. The bestest European company
  - type: input
    id: url
    attributes:
      label: URL
      description: Insert here a link to the product page
      placeholder: ex. https://example.org/
  - type: input
    id: confirmationUrl
    attributes:
      label: Confirmation URL
      description: On what page can one see evidence that this product is manufactured in Europe?
      placeholder: ex. https://example.org/about-us/
  - type: textarea
    id: confirmationDescription
    attributes:
      label: Confirmation text
      description: Insert here a direct quote from that page that clearly shows that the product is manufactured in Europe.
      placeholder: ex. Our socks are made locally in Sweden
  - type: input
    id: tags
    attributes:
      label: Tags
      description: 	Insert a list of tags you suggest to associate with the product. Use commas or spaces to separate tags.
      placeholder: ex. electronics:computer:laptop, clothes:shoes:dress:oxford
  - type: dropdown
    id: countryManufactured
    attributes:
      label: Manufacturer's location
      description: Where are the products being physically manufactured?
